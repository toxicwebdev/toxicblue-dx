name: Cleanup Old Images
on:
  schedule:
    - cron: "15 1 * * 0" # 01:15 UTC по Воскресеньям
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}

permissions: {}

jobs:
  delete-older-than-90:
    name: Cleanup
    runs-on: ubuntu-latest
    permissions:
      packages: write # требуется для настройки прав доступа к репозиторию
    steps:
      - name: Delete Images Older Than 90 Days
        uses: dataaxiom/ghcr-cleanup-action@374e2028c8fb93b7219f3771cd405fab95d3dec4 # v1.2.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          packages: hyprland-dx,hyprland-nvidia-dx,labwc-dx,labwc-nvidia-dx,niri-dx,niri-nvidia-dx,river-dx,river-nvidia-dx,sway-dx,sway-nvidia-dx
          older-than: 90 days
          delete-orphaned-images: true
          keep-n-tagged: 7
          keep-n-untagged: 7